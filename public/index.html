<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A two-player chess game built with Java OOP backend and clean browser UI. Educational project showcasing object-oriented design.">
    <title>Chess Engine — Java OOP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-brand">
                <span class="header-icon">♚</span>
                <h1>Chess Engine</h1>
            </div>
            <p class="header-subtitle">Java OOP • Two-Player • Local</p>
        </header>

        <!-- Main Layout -->
        <main class="main-layout" id="main-layout">
            <!-- Left Panel - Black's Captured Pieces -->
            <aside class="side-panel" id="left-panel">
                <div class="captured-section">
                    <h3 class="panel-title">
                        <span class="color-dot black-dot"></span>
                        Captured by Black
                    </h3>
                    <div class="captured-pieces" id="captured-by-black"></div>
                </div>
            </aside>

            <!-- Center - Board -->
            <section class="board-section">
                <!-- Status Bar -->
                <div class="status-bar" id="status-bar">
                    <div class="turn-indicator" id="turn-indicator">
                        <span class="turn-dot" id="turn-dot"></span>
                        <span id="turn-text">White's Turn</span>
                    </div>
                    <div class="game-message" id="game-message"></div>
                </div>

                <!-- Chess Board -->
                <div class="board-wrapper">
                    <div class="board-labels-top">
                        <span>a</span><span>b</span><span>c</span><span>d</span>
                        <span>e</span><span>f</span><span>g</span><span>h</span>
                    </div>
                    <div class="board-with-ranks">
                        <div class="board-labels-left">
                            <span>8</span><span>7</span><span>6</span><span>5</span>
                            <span>4</span><span>3</span><span>2</span><span>1</span>
                        </div>
                        <div class="board" id="chess-board"></div>
                        <div class="board-labels-right">
                            <span>8</span><span>7</span><span>6</span><span>5</span>
                            <span>4</span><span>3</span><span>2</span><span>1</span>
                        </div>
                    </div>
                    <div class="board-labels-bottom">
                        <span>a</span><span>b</span><span>c</span><span>d</span>
                        <span>e</span><span>f</span><span>g</span><span>h</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="btn btn-restart" id="btn-restart" onclick="restartGame()">
                        ↺ New Game
                    </button>
                    <span class="move-counter" id="move-counter">Move: 0</span>
                </div>
            </section>

            <!-- Right Panel - White's Captured Pieces -->
            <aside class="side-panel" id="right-panel">
                <div class="captured-section">
                    <h3 class="panel-title">
                        <span class="color-dot white-dot"></span>
                        Captured by White
                    </h3>
                    <div class="captured-pieces" id="captured-by-white"></div>
                </div>
            </aside>
        </main>

        <!-- Promotion Modal -->
        <div class="modal-overlay" id="promotion-modal" style="display:none;">
            <div class="modal">
                <h2>Pawn Promotion</h2>
                <p>Choose a piece:</p>
                <div class="promotion-choices" id="promotion-choices"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
